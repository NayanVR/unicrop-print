services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        volumes:
            - app-public:/var/www/html/public
        env_file: .env
        depends_on:
            mysql:
                condition: service_healthy
            garage:
                condition: service_started
        networks:
            - internal

    nginx:
        image: nginx:1.27-alpine
        restart: unless-stopped
        volumes:
            - app-public:/var/www/html/public:ro
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        networks:
            - internal
            - dokploy-network

    mysql:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-unicrop_print}
            MYSQL_USER: ${DB_USERNAME:-unicrop}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - mysql-data:/var/lib/mysql
        ports:
            - "${FORWARD_DB_PORT:-3306}:3306"
        healthcheck:
            test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - internal

    garage:
        image: dxflrs/garage:v1.0.1
        restart: unless-stopped
        environment:
            GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-changeme0123456789abcdef0123456789abcdef0123456789abcdef01}
            GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-changeme-admin-token}
        volumes:
            - ./docker/garage/garage.toml:/etc/garage.toml
            - garage-meta:/var/lib/garage/meta
            - garage-data:/var/lib/garage/data
            - ./scripts/garage-setup.sh:/scripts/garage-setup.sh
        networks:
            - internal

networks:
    internal:
        driver: bridge
    dokploy-network:
        external: true

volumes:
    mysql-data:
    garage-meta:
    garage-data:
    app-public:
