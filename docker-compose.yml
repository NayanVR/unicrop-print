services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
        restart: unless-stopped
        volumes:
            - ./:/var/www/html
            - /var/www/html/vendor
            - /var/www/html/node_modules
        env_file: .env
        depends_on:
            mysql:
                condition: service_healthy
            garage:
                condition: service_started
        networks:
            - unicrop

    nginx:
        image: nginx:1.27-alpine
        restart: unless-stopped
        ports:
            - "${APP_PORT:-8080}:80"
        volumes:
            - ./:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - unicrop

    mysql:
        image: mysql:8.4
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-unicrop_print}
            MYSQL_USER: ${DB_USERNAME:-unicrop}
            MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
        volumes:
            - mysql-data:/var/lib/mysql
        ports:
            - "${FORWARD_DB_PORT:-3306}:3306"
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
            - unicrop

    garage:
        image: dxflrs/garage:v1.0.1
        restart: unless-stopped
        environment:
            GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET:-changeme0123456789abcdef0123456789abcdef0123456789abcdef01}
            GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN:-changeme-admin-token}
        volumes:
            - ./docker/garage/garage.toml:/etc/garage.toml
            - garage-meta:/var/lib/garage/meta
            - garage-data:/var/lib/garage/data
            - ./scripts/garage-setup.sh:/scripts/garage-setup.sh
        ports:
            - "${FORWARD_GARAGE_S3_PORT:-3900}:3900"
            - "${FORWARD_GARAGE_ADMIN_PORT:-3903}:3903"
        networks:
            - unicrop

networks:
    unicrop:
        driver: bridge

volumes:
    mysql-data:
    garage-meta:
    garage-data:
